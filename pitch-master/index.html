<style>
:root{
  --ink:#0B0E13;--ink-2:#10151C;--panel:#141A22;--panel-2:#1A222C;
  --line:#242D39;--line-2:#333850;--tx:#EAEDF1;--mut:#8B95A4;--dim:#5C6675;
  --amber:#FFB020;--amber-soft:#F5C36B;--red:#E0634E;--go:#37D399;--blue:#5B8DEF;
  --display:'Space Grotesk',sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --maxw:1120px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--tx);font-family:var(--body);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:inherit;text-decoration:none}
.deck{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.deck::-webkit-scrollbar{display:none}
.slide{position:relative;min-height:100vh;height:100vh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:60px clamp(24px,5vw,80px)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4;pointer-events:none;z-index:0;background:radial-gradient(circle,rgba(255,176,32,.4),transparent 65%)}
.inner{position:relative;z-index:2;width:100%;max-width:var(--maxw);margin:0 auto}
.rv{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.slide.active .rv{opacity:1;transform:none}
.brand{font-family:var(--display);font-weight:700;letter-spacing:.02em;font-size:clamp(20px,2.2vw,26px)}
.brand b{color:var(--amber)}
.eyebrow{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);display:inline-flex;align-items:center;gap:10px;margin-bottom:18px}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--amber);opacity:.7}
h1,h2{font-family:var(--display);font-weight:600;line-height:1.12;letter-spacing:-.01em}
.h-xl{font-size:clamp(30px,4.4vw,54px)}
.h-lg{font-size:clamp(26px,3.4vw,42px)}
.h-md{font-size:clamp(22px,2.8vw,34px)}
.lead{color:var(--mut);font-size:clamp(16px,1.5vw,20px);max-width:64ch;margin-top:18px}
.amber-t{color:var(--amber)}
.note{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.02em}
.pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:100px;border:1px solid rgba(255,176,32,.35);color:var(--amber-soft);background:rgba(255,176,32,.08)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px}
.card h3{font-family:var(--display);font-weight:600;font-size:clamp(16px,1.6vw,19px);margin-bottom:8px}
.card p{color:var(--mut);font-size:14.5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:760px){.grid2,.grid3,.grid5{grid-template-columns:1fr}.slide{height:auto}}
.big{font-family:var(--display);font-weight:700;font-size:clamp(34px,5vw,64px);color:var(--amber);line-height:1;letter-spacing:-.02em}
.chain{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.chain .lnk{font-family:var(--mono);font-size:clamp(12px,1.2vw,14px);color:#D6DBE6;background:var(--panel-2);border:1px solid var(--line);padding:9px 13px;border-radius:9px}
.chain .lnk.end{border-color:var(--amber);color:var(--amber)}
.chain .sep{color:var(--dim)}
ul.plain{list-style:none;display:flex;flex-direction:column;gap:10px}
ul.plain li{position:relative;padding-left:22px;color:#D6DBE6;font-size:15px}
ul.plain li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--amber);opacity:.75}
/* tablo — grid: логотип фикс. ширины + текст 1fr (без position:absolute) */
.tablo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.brow{display:grid;grid-template-columns:76px 1fr;gap:14px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.brow .lg{width:76px;height:34px;display:flex;align-items:center}
.brow .lg img{max-width:100%;max-height:100%;object-fit:contain;object-position:left center;display:block}
.brow .bn{font-family:var(--display);font-weight:600;font-size:15px}
@media(max-width:860px){.tablo-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.tablo-grid{grid-template-columns:1fr}.brow{grid-template-columns:60px 1fr}.brow .lg{width:60px;height:28px}}
.wall{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.wall .wt{height:44px;min-width:96px;background:var(--panel);border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;padding:10px 16px}
.wall .wt img{max-height:22px;max-width:100px;object-fit:contain;opacity:.85}
/* case hero */
.case{display:grid;grid-template-columns:.92fr 1.08fr;gap:clamp(24px,4vw,50px);align-items:center;width:100%}
@media(max-width:760px){.case{grid-template-columns:1fr;gap:22px}}
.case-num{font-family:var(--display);font-weight:700;font-size:clamp(18px,1.9vw,24px);width:clamp(50px,5.5vw,66px);height:clamp(50px,5.5vw,66px);border-radius:50%;border:2px solid var(--amber);color:var(--amber);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.case-kind{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-top:16px}
.case-stat{font-family:var(--display);font-weight:700;font-size:clamp(40px,6vw,80px);color:var(--amber);line-height:1;letter-spacing:-.03em;margin-top:12px}
.case-res{color:#D6DBE6;font-size:16px;margin-top:12px;max-width:34ch}
.case-annot{font-family:var(--mono);font-size:13px;color:var(--amber-soft);margin-top:16px;letter-spacing:.01em}
.case-annot::before{content:"↳ ";color:var(--amber)}
.case-logo{height:26px;margin-top:16px;filter:grayscale(1) brightness(0) invert(1);opacity:.8}
.srow{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--line-2);border-radius:12px;padding:14px 17px}
.srow.a{border-left-color:var(--red)}.srow.did{border-left-color:var(--blue)}.srow.res{border-left-color:var(--amber)}
.srow .k{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.srow p{font-size:14.5px;color:#D6DBE6}
.srow.res p{color:#fff;font-weight:500}
/* price + calc + fork */
.price-num{font-family:var(--display);font-weight:700;font-size:clamp(40px,6vw,84px);color:var(--amber);letter-spacing:-.02em;line-height:1}
.ladder{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:760px){.ladder{grid-template-columns:1fr}}
.tier{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px}
.tier.active{border-color:var(--amber);background:linear-gradient(180deg,rgba(255,176,32,.07),var(--panel))}
.tier .tp{font-family:var(--display);font-weight:700;font-size:22px;color:var(--amber)}
.tier .tt{font-weight:600;margin:6px 0 8px}
.tier .ts{font-size:13px;color:var(--mut)}
.calc-flow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:8px}
.calc-flow .st{font-family:var(--mono);font-size:12.5px;color:#D6DBE6;background:var(--panel-2);border:1px solid var(--line);padding:9px 13px;border-radius:9px}
.fork{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.fork{grid-template-columns:1fr}}
.path{border-radius:16px;padding:28px}
.path.dim{background:var(--panel);border:1px solid var(--line)}
.path.win{background:linear-gradient(160deg,rgba(255,176,32,.12),var(--panel-2));border:1px solid rgba(255,176,32,.45)}
.path .pl{font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.path.win .pl{color:var(--amber)}
.path h3{font-family:var(--display);font-weight:600;font-size:clamp(18px,1.9vw,23px)}
.path ul{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:8px}
.path li{color:var(--mut);font-size:14px;padding-left:18px;position:relative}
.path.dim li::before{content:"·";position:absolute;left:4px;color:var(--dim)}
.path.win li{color:#E4E8F0}.path.win li::before{content:"→";position:absolute;left:0;color:var(--amber)}
.fvid{width:210px;max-width:40vw;border-radius:14px;border:1px solid var(--line);background:#000;aspect-ratio:1/1;object-fit:cover;flex-shrink:0}
@media(max-width:600px){.fvid{width:100%;max-width:none;aspect-ratio:16/10}}
.founder-wrap{display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:start}
@media(max-width:600px){.founder-wrap{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:16px;padding:14px 26px;border-radius:11px;background:var(--amber);color:#181206;transition:transform .15s,box-shadow .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px -10px rgba(255,176,32,.45)}
.legal{font-family:var(--mono);font-size:12px;color:var(--dim);line-height:1.9;margin-top:20px}
.flag{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:8px}
/* ui */
.pdf{position:fixed;right:22px;top:20px;z-index:50;font-family:var(--mono);font-size:12px;color:var(--mut);background:rgba(20,26,34,.8);border:1px solid var(--line);padding:10px 15px;border-radius:11px;cursor:pointer;backdrop-filter:blur(8px)}
.pdf:hover{border-color:var(--amber);color:var(--amber)}
.dots{position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:7px;max-height:80vh;overflow:hidden}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--line);cursor:pointer;transition:.2s;flex-shrink:0}
.dots i.on{background:var(--amber);transform:scale(1.3)}
.ui-br{position:fixed;right:22px;bottom:20px;z-index:50;display:flex;align-items:center;gap:10px}
.ui-btn{width:42px;height:42px;border-radius:11px;background:rgba(20,26,34,.8);border:1px solid var(--line);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);font-size:18px}
.ui-btn:hover{border-color:var(--amber);color:var(--amber)}
.counter{font-family:var(--mono);font-size:12.5px;color:var(--mut);background:rgba(20,26,34,.8);border:1px solid var(--line);padding:9px 13px;border-radius:11px;backdrop-filter:blur(8px);min-width:64px;text-align:center}
.notes{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(110%);z-index:60;max-width:820px;width:calc(100% - 40px);background:rgba(11,14,19,.96);border:1px solid var(--line);border-bottom:none;border-radius:14px 14px 0 0;padding:16px 22px;backdrop-filter:blur(12px);transition:transform .3s ease}
.notes.show{transform:translateX(-50%) translateY(0)}
.notes .nk{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.notes .nt{color:#E4E8F0;font-size:15px;line-height:1.5}
.hint{position:fixed;left:18px;bottom:16px;z-index:50;font-family:var(--mono);font-size:11px;color:var(--dim)}
@media(max-width:820px){.dots,.hint{display:none}}
@media print{
  @page{size:1280px 720px;margin:0}
  html,body{overflow:visible;background:var(--ink)}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .deck{height:auto;overflow:visible;display:block}
  .slide{height:720px;min-height:720px;width:1280px;page-break-after:always;break-after:page}
  .rv{opacity:1!important;transform:none!important}
  .pdf,.dots,.ui-br,.notes,.hint{display:none!important}
}
</style>

  }
  function howItWorks(){
    return slide('<span class="rv eyebrow">Как это работает</span><h2 class="rv h-md" style="margin-bottom:26px">Путь до встречи</h2>'
      +'<div class="rv chain"><span class="lnk">Прямые контакты нужного человека</span><span class="sep">→</span>'
      +'<span class="lnk">Первое касание</span><span class="sep">→</span><span class="lnk">Лёгкий follow-up</span><span class="sep">→</span>'
      +'<span class="lnk">Экспертный follow-up</span><span class="sep">→</span><span class="lnk">Звонок, если можно</span><span class="sep">→</span><span class="lnk end">Встреча</span></div>'
      +'<p class="rv lead" style="margin-top:26px">В среднем примерно пять таких диалогов из десяти доходят до встречи.</p>','');
  }
  function remains(){
    var it=D.niches.remains.items, half=Math.ceil(it.length/2);
    function ul(arr){return '<ul class="plain">'+arr.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>';}
    return slide('<span class="rv eyebrow">Что остаётся у вас</span><h2 class="rv h-md" style="margin-bottom:24px">'+esc(D.niches.remains.title)+'</h2>'
      +'<div class="rv grid2">'+ul(it.slice(0,half))+ul(it.slice(half))+'</div>','');
  }
  function insideProof(){
    var p=D.brands.inside_proof;
    return slide('<span class="rv eyebrow">Отстройка</span><h2 class="rv h-md" style="max-width:22ch">'+esc(p.title)+'</h2>'
      +'<p class="rv lead">'+esc(p.body)+'</p>'+(p.note?'<p class="rv flag">'+esc(p.note)+'</p>':''),'Не аренда лидов, не привязка к нам. Станок остаётся у клиента.');
  }
  function niches(){
    var cells=(D.niches.segments||[]).map(function(n){return '<div class="card"><h3>'+esc(n.title)+'</h3><p>'+esc(n.offer)+'</p></div>';}).join('');
    return slide('<span class="rv eyebrow">Под ваш сегмент</span><h2 class="rv h-md" style="margin-bottom:24px">Оффер разворачивается под нишу</h2>'
      +'<div class="rv grid3">'+cells+'</div>','');
  }
  function priceLadder(){
    var tiers=(D.prices.ladder||[]).map(function(t){return '<div class="tier'+(t.active?' active':'')+'"><div class="tp">'+esc(t.price)+'</div><div class="tt">'+esc(t.title)+'</div><div class="ts">'+esc(t.scope)+'</div></div>';}).join('');
    return slide('<span class="rv eyebrow">Цена</span>'
      +'<h2 class="rv h-md" style="margin-bottom:8px">Активная модель — '+esc(D.prices.ladder[0].price)+', один раз</h2>'
      +'<p class="rv note" style="margin-bottom:22px">Это примерно оклад одного менеджера. Ниже — вся лестница как склад; берём нужный тир.</p>'
      +'<div class="rv ladder">'+tiers+'</div>','Активный якорь — из meta.default_anchor. Скидка = режем скоуп, не роняем цену.');
  }
  function calc(){
    var c=D.prices.calculator, e=c.example;
    var steps=c.steps.map(function(s){return '<span class="st">'+esc(s)+'</span>';}).join('<span class="sep" style="color:var(--dim)">→</span>');
    return slide('<span class="rv eyebrow">Окупаемость</span><h2 class="rv h-md" style="margin-bottom:20px">'+esc(c.title)+'</h2>'
      +'<div class="rv calc-flow">'+steps+'</div>'
      +'<div class="rv grid3" style="margin-top:24px">'
        +'<div class="card"><div class="note" style="margin-bottom:8px">Пример: чек</div><div class="big" style="font-size:24px">'+esc(e.check)+'</div></div>'
        +'<div class="card"><div class="note" style="margin-bottom:8px">Ценность встречи</div><div class="big" style="font-size:24px">'+esc(e.meeting_value)+'</div></div>'
        +'<div class="card active" style="border-color:var(--amber)"><div class="note" style="margin-bottom:8px">Окупаемость</div><div class="big" style="font-size:24px">'+esc(e.payback)+'</div></div>'
      +'</div>'
      +'<p class="rv lead" style="margin-top:20px;max-width:66ch">'+esc(c.reframe)+'</p>'
      +'<p class="rv note" style="margin-top:8px">'+esc(c.inputs_placeholder)+'</p>','Переворот якоря: встречи кончатся, система останется.');
  }
  function founder(){
    var f=D.founder;
    return slide('<div class="founder-wrap"><div class="rv"><video class="fvid" '+esc(f.video_attrs)+' preload="auto" src="'+esc(f.video)+'"></video></div>'
      +'<div class="rv"><span class="eyebrow">Кто за этим стоит</span>'
      +'<p class="lead" style="margin-top:0;color:#D6DBE6;max-width:60ch">'+esc(f.quote)+'</p>'
      +'<div style="margin-top:18px"><b style="font-family:var(--display)">'+esc(f.name)+'</b><div class="note" style="margin-top:4px">'+esc(f.role)+'</div></div>'
      +'<p class="lead n" style="margin-top:18px"><b style="color:#fff">'+esc(f.differentiation.title)+'.</b> '+esc(f.differentiation.body)+'</p>'
      +'<p class="note" style="margin-top:12px">'+esc(f.mission.body)+'</p>'
      +'</div></div>','Реальное видео основателя. Отстройка + зачем это, деловым языком.');
  }
  function fork(){
    return slide('<span class="rv eyebrow" style="display:flex;justify-content:center">Два пути</span><h2 class="rv h-md" style="text-align:center;margin-bottom:26px">Отсюда два варианта</h2>'
      +'<div class="rv fork"><div class="path dim"><div class="pl">Как есть</div><h3>Оставить поток встреч на паре людей</h3>'
      +'<ul><li>то густо, то пусто</li><li>держится на одном человеке</li><li>ушёл — начинать заново</li></ul></div>'
      +'<div class="path win"><div class="pl">С системой</div><h3>Поставить станок, который остаётся у вас</h3>'
      +'<ul><li>предсказуемый поток встреч с ЛПР</li><li>работает у любого менеджера</li><li>остаётся у вас и работает годами</li></ul></div></div>','Оригинальная развилка, без образов «Матрицы». Финал — один вопрос на следующий шаг.');
  }
  function cta(){
    return '<section class="slide" data-notes="Спокойный следующий шаг, без нажима.">'+orbs()+'<div class="inner" style="text-align:center">'
      +'<div class="rv brand" style="margin-bottom:24px">MEET<b>ENGINE</b></div>'
      +'<h2 class="rv h-lg" style="max-width:22ch;margin:0 auto">Покажу на ваших примерах, как это будет работать у вас</h2>'
      +'<p class="rv lead" style="margin:18px auto 0;max-width:52ch">Разберём, кто ваши нужные люди и как до них доходить.</p>'
      +'<a class="rv btn" href="https://t.me/'+esc(D.meta.contact.telegram.replace("@",""))+'" style="margin-top:26px">Написать</a>'
      +'<div class="rv legal">Telegram '+esc(D.meta.contact.telegram)+' · '+esc(D.meta.contact.founder)+'<br>'+esc(D.meta.contact.legal)+'</div>'
      +'</div></section>';
  }

  var ATT={
    "hero-cases":function(){return (D.cases.hero||[]).map(function(c,i){return heroCase(c,i+1);}).join('');},
    "grid-cases":function(){return (D.cases.grid&&D.cases.grid.length)?gridCases():'';},
    "how-it-works":howItWorks,"remains":remains,"inside-proof":insideProof,"niches":niches,
    "price-ladder":priceLadder,"calculator":calc,"founder":founder,"fork":fork,"cta":cta
  };
  (D.objections.steps||[]).forEach(function(o){
    if(o.body){ S.push(slide('<span class="rv eyebrow">'+esc(o.topic)+'</span><h2 class="rv h-md" style="max-width:22ch">'+esc(o.title)+'</h2><p class="rv lead">'+esc(o.body)+'</p>','')); }
    else if(o.attach && o.attach.length){ S.push(slide('<span class="rv eyebrow">'+esc(o.topic)+'</span><h2 class="rv h-md">'+esc(o.title)+'</h2>','')); }
    (o.attach||[]).forEach(function(a){ if(ATT[a]){var h=ATT[a]();if(h)S.push(h);} });
  });

  document.getElementById('deck').innerHTML=S.join('\n');

  // nav
  var deck=document.getElementById('deck'), slides=[].slice.call(document.querySelectorAll('.slide')), cur=-1;
  document.getElementById('total').textContent=slides.length;
  var dw=document.getElementById('dots');
  slides.forEach(function(s,i){var d=document.createElement('i');if(i===0)d.className='on';d.addEventListener('click',function(){go(i)});dw.appendChild(d)});
  var dots=[].slice.call(dw.children);
  function stag(s){s.querySelectorAll('.rv').forEach(function(el,i){el.style.transitionDelay=(i*55)+'ms';})}
  function setA(i){if(i===cur)return;cur=i;slides.forEach(function(s,j){s.classList.toggle('active',j===i)});dots.forEach(function(d,j){d.classList.toggle('on',j===i)});document.getElementById('cur').textContent=i+1;document.getElementById('notesText').textContent=slides[i].getAttribute('data-notes')||'';stag(slides[i]);}
  function go(i){i=Math.max(0,Math.min(slides.length-1,i));slides[i].scrollIntoView({behavior:'smooth'});setA(i);}
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting&&e.intersectionRatio>=.55)setA(slides.indexOf(e.target))})},{root:deck,threshold:[.55]});
  slides.forEach(function(s){io.observe(s)});setA(0);
  document.addEventListener('keydown',function(e){var k=e.key;if(k==='ArrowDown'||k==='ArrowRight'||k==='PageDown'){e.preventDefault();go(cur+1);}else if(k==='ArrowUp'||k==='ArrowLeft'||k==='PageUp'){e.preventDefault();go(cur-1);}else if(k==='Home'){e.preventDefault();go(0);}else if(k==='End'){e.preventDefault();go(slides.length-1);}else if(k.toLowerCase()==='s'){document.getElementById('notes').classList.toggle('show');}});
  document.getElementById('next').addEventListener('click',function(){go(cur+1)});
  document.getElementById('prev').addEventListener('click',function(){go(cur-1)});
  document.getElementById('pdfBtn').addEventListener('click',function(){window.print()});
})();
</script>
</body>
</html>
